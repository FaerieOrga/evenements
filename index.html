<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Événements de Faérie</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --parchment:    #f2e8c9;
  --parchment-dk: #e0ceA0;
  --ink:          #2a1a0a;
  --ink-light:    #5c3d1e;
  --red-blood:    #8b1a1a;
  --gold:         #9a7b2f;
  --gold-light:   #c9a84c;
  --border:       #6b4c1e;
  --shadow:       rgba(30,15,5,0.45);
  --bg-img:       url('https://drive.google.com/uc?export=view&id=142vQlX6NsPL118l3x-VHn9iNx94Vydng');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #1a0f05 var(--bg-img) center/cover fixed;
  font-family: 'Crimson Text', Georgia, serif;
  color: var(--ink);
  font-size: 16px;
  line-height: 1.6;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: rgba(10,5,2,0.55);
  pointer-events: none;
  z-index: 0;
}
#app {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}
.parchment {
  background: var(--parchment) var(--bg-img) center/cover;
  border: 3px solid var(--border);
  border-radius: 4px;
  padding: 36px 40px;
  box-shadow: 0 0 0 1px var(--gold), 0 8px 32px var(--shadow), inset 0 0 80px rgba(160,120,40,0.18);
  position: relative;
  overflow: hidden;
}
.parchment::before, .parchment::after {
  content: '✦';
  position: absolute;
  font-size: 28px;
  color: var(--gold);
  opacity: 0.7;
  line-height: 1;
}
.parchment::before { top: 10px; left: 14px; }
.parchment::after  { bottom: 10px; right: 14px; }

/* ── EN-TÊTE ── */
.site-header { text-align: center; padding: 32px 0 24px; }
.site-title {
  font-family: 'Cinzel', serif;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--parchment);
  text-shadow: 0 2px 12px rgba(0,0,0,0.7), 1px 1px 0 var(--gold);
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.site-subtitle {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  color: var(--gold-light);
  font-size: 1.1rem;
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
}

/* ── FORMS ── */
.form-group { margin-bottom: 16px; text-align: left; }
label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 0.78rem;
  letter-spacing: 1.5px;
  color: var(--ink-light);
  margin-bottom: 5px;
  text-transform: uppercase;
}
input[type="text"], input[type="email"], input[type="password"],
input[type="date"], input[type="datetime-local"], input[type="number"], select, textarea {
  width: 100%;
  background: rgba(242,232,201,0.6);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 9px 12px;
  font-family: 'Crimson Text', serif;
  font-size: 1rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(154,123,47,0.2);
}
textarea { min-height: 100px; resize: vertical; line-height: 1.7; }

/* ── BOUTONS ── */
.btn {
  display: inline-block;
  padding: 10px 28px;
  background: var(--ink);
  color: var(--parchment);
  border: 1px solid var(--gold);
  border-radius: 2px;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
.btn:hover { background: var(--gold); color: var(--ink); }
.btn-full  { width: 100%; text-align: center; }
.btn-sm    { padding: 6px 16px; font-size: 0.75rem; }
.btn-danger { background: var(--red-blood); border-color: var(--red-blood); color: #fff; }
.btn-danger:hover { background: #6b0f0f; }
.btn-orga { background: var(--red-blood); border-color: var(--red-blood); }
.btn-orga:hover { background: #6b0f0f; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink-light);
  padding: 6px 14px;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
}
.btn-ghost:hover { background: rgba(154,123,47,0.15); }

/* ── MESSAGES ── */
.msg-error {
  background: rgba(139,26,26,0.12);
  border: 1px solid var(--red-blood);
  color: var(--red-blood);
  padding: 8px 14px;
  border-radius: 2px;
  font-size: 0.9rem;
  margin-top: 10px;
  display: none;
}
.msg-success {
  background: rgba(47,100,47,0.12);
  border: 1px solid #3a6b3a;
  color: #2a4a2a;
  padding: 8px 14px;
  border-radius: 2px;
  font-size: 0.9rem;
  margin-top: 10px;
  display: none;
}

/* ── LOGOUT BAR ── */
.logout-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 10px 16px;
  background: rgba(30,15,5,0.7);
  border: 1px solid var(--gold);
  color: var(--parchment);
}
.logout-bar span { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 1px; }

/* ── ONGLETS ── */
.tab-switch {
  display: flex;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.tab-switch button {
  flex: 1;
  padding: 10px;
  background: rgba(160,120,40,0.1);
  border: none;
  border-right: 1px solid var(--border);
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 1px;
  color: var(--ink-light);
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.tab-switch button:last-child { border-right: none; }
.tab-switch button.active { background: var(--gold); color: #fff; font-weight: 600; }

/* ── FILTRE ── */
.filter-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.filter-bar input, .filter-bar select { flex: 1; min-width: 140px; max-width: 260px; }

/* ── CARTES ÉVÉNEMENTS ── */
.events-grid { display: flex; flex-direction: column; gap: 18px; }
.event-card {
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.12);
  transition: box-shadow 0.2s, transform 0.15s;
}
.event-card:hover { box-shadow: 0 4px 20px var(--shadow); transform: translateY(-1px); }
.event-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(107,76,30,0.25);
  gap: 12px;
  flex-wrap: wrap;
}
.event-card-titre {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.event-card-type {
  display: inline-block;
  padding: 3px 12px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 1px;
  background: rgba(154,123,47,0.15);
  color: var(--ink-light);
  white-space: nowrap;
}
.event-card-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 14px 20px;
}
.event-info-item { display: flex; flex-direction: column; gap: 2px; }
.event-info-label {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-light);
}
.event-info-val { font-family: 'Crimson Text', serif; font-size: 0.97rem; color: var(--ink); }

/* Description */
.event-description {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.97rem;
  color: var(--ink);
  line-height: 1.75;
  padding: 0 20px 14px;
  border-bottom: 1px solid rgba(107,76,30,0.15);
}

.event-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px 14px;
  gap: 10px;
  flex-wrap: wrap;
}
.jauge-wrap { display: flex; align-items: center; gap: 8px; }
.jauge-bar { width: 120px; height: 6px; background: rgba(107,76,30,0.2); border-radius: 3px; overflow: hidden; }
.jauge-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s; }
.jauge-fill.complet { background: var(--red-blood); }
.jauge-text { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--ink-light); white-space: nowrap; }
.badge-attente {
  background: rgba(139,26,26,0.12);
  border: 1px solid var(--red-blood);
  color: var(--red-blood);
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 1px;
  padding: 2px 10px;
  border-radius: 2px;
}
.badge-inscrit {
  background: rgba(47,100,47,0.12);
  border: 1px solid #3a6b3a;
  color: #2a4a2a;
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  letter-spacing: 1px;
  padding: 2px 10px;
  border-radius: 2px;
}

/* ── TABLE ORGA ── */
.orga-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
.orga-table th {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-light);
  border-bottom: 2px solid var(--gold);
  padding: 8px 10px;
  text-align: left;
}
.orga-table td { padding: 8px 10px; border-bottom: 1px solid rgba(107,76,30,0.2); vertical-align: middle; }
.orga-table tr:hover td { background: rgba(154,123,47,0.06); }
.orga-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }

/* ── MODALES ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,5,2,0.78);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--parchment) var(--bg-img) center/cover;
  border: 2px solid var(--border);
  box-shadow: 0 0 0 1px var(--gold), 0 12px 48px rgba(0,0,0,0.6);
  padding: 30px 34px;
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}
.modal-box-wide { max-width: 660px; }
.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--ink);
  text-align: center;
}
.modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 1.4rem; color: var(--ink-light); cursor: pointer; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--ink);
  color: var(--parchment);
  border: 1px solid var(--gold);
  padding: 12px 22px;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 1px;
  box-shadow: 0 4px 20px var(--shadow);
  z-index: 200;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── PIED DE PAGE ── */
.site-footer { text-align: center; margin-top: 36px; padding-bottom: 10px; }
.footer-orga-link {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 1px;
  color: rgba(200,180,140,0.3);
  cursor: pointer;
  border: none;
  background: none;
  transition: color 0.2s;
}
.footer-orga-link:hover { color: var(--gold-light); }

/* ── ÉTAT VIDE ── */
.empty-state {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  color: var(--ink-light);
  padding: 30px 0;
  text-align: center;
  font-size: 1.1rem;
}

@media (max-width: 600px) {
  .parchment { padding: 22px 18px; }
  .modal-box { padding: 22px 18px; }
  .event-card-body { grid-template-columns: 1fr 1fr; }
  .site-title { font-size: 1.7rem; }
  .orga-table th:nth-child(3), .orga-table td:nth-child(3),
  .orga-table th:nth-child(4), .orga-table td:nth-child(4) { display: none; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ══ PAGE PUBLIQUE ══ -->
  <div id="public-screen">
    <div class="site-header">
      <div class="site-title">⚔ Événements de Faérie ⚔</div>
      <div class="site-subtitle">Les prochaines aventures vous attendent</div>
    </div>

    <div class="parchment">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <div style="font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;letter-spacing:2px;color:var(--ink)">Événements à venir</div>
        <div id="header-user-zone"></div>
      </div>
      <div class="filter-bar">
        <input type="text" id="filter-search" placeholder="Rechercher un événement…" oninput="filterEvents()">
        <select id="filter-type" onchange="filterEvents()">
          <option value="">Tous les types</option>
          <option value="GN">GN</option>
          <option value="Atelier">Atelier</option>
          <option value="Réunion">Réunion</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="events-grid" id="public-events-grid">
        <div class="empty-state">Chargement des événements…</div>
      </div>
    </div>

    <div class="site-footer">
      <button class="footer-orga-link" onclick="openOrgaLogin()">⚔ Accès organisateur</button>
    </div>
  </div>

  <!-- ══ VUE ORGA ══ -->
  <div id="orga-screen" style="display:none">
    <div class="logout-bar">
      <span>⚔ Organisateur — Événements de Faérie</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="logoutOrga()">← Retour à l'accueil</button>
      </div>
    </div>
    <div class="parchment">
      <div style="font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;letter-spacing:2px;margin-bottom:22px;color:var(--ink);">⚔ Gestion des Événements</div>
      <div class="orga-toolbar">
        <button class="btn btn-sm" onclick="openModalCreateEvent()">+ Nouvel événement</button>
        <input type="text" id="orga-search" placeholder="Filtrer…" style="max-width:220px;margin-left:auto" oninput="filterOrgaEvents(this.value)">
      </div>
      <table class="orga-table">
        <thead>
          <tr><th>Titre</th><th>Début</th><th>Lieu</th><th>Type</th><th>Places</th><th>Actions</th></tr>
        </thead>
        <tbody id="orga-events-body">
          <tr><td colspan="6" style="text-align:center;padding:20px;font-style:italic;color:var(--ink-light);">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ══ MODAL AUTH ══ -->
<div class="modal-overlay" id="modal-auth">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-auth')">✕</button>
    <div class="modal-title" id="modal-auth-titre">Rejoindre Faérie</div>
    <div id="auth-context" style="display:none;font-family:'IM Fell English',serif;font-style:italic;text-align:center;color:var(--ink-light);font-size:1rem;margin-bottom:16px;padding:10px 14px;border:1px solid var(--border);border-radius:2px;background:rgba(154,123,47,0.08)"></div>
    <div class="tab-switch">
      <button class="active" id="tab-connexion" onclick="switchAuthTab('connexion')">Se connecter</button>
      <button id="tab-inscription" onclick="switchAuthTab('inscription')">Créer un compte</button>
    </div>
    <div id="form-connexion">
      <div class="form-group">
        <label>Adresse e-mail</label>
        <input type="email" id="login-email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-mdp" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn btn-full" onclick="doLogin()">Se connecter</button>
      <div class="msg-error"   id="err-login"></div>
      <div class="msg-success" id="ok-login"></div>
    </div>
    <div id="form-inscription" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="reg-prenom" placeholder="Votre prénom">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="reg-nom" placeholder="Votre nom">
        </div>
      </div>
      <div class="form-group">
        <label>Adresse e-mail</label>
        <input type="email" id="reg-email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="reg-mdp" placeholder="••••••••" onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <button class="btn btn-full" onclick="doRegister()">Créer mon compte</button>
      <div class="msg-error"   id="err-reg"></div>
      <div class="msg-success" id="ok-reg"></div>
    </div>
  </div>
</div>

<!-- ══ MODAL LOGIN ORGA ══ -->
<div class="modal-overlay" id="modal-orga-auth">
  <div class="modal-box" style="max-width:400px">
    <button class="modal-close" onclick="closeModal('modal-orga-auth')">✕</button>
    <div class="modal-title">⚔ Accès Organisateur</div>
    <div class="form-group">
      <label>Mot de passe organisateur</label>
      <input type="password" id="orga-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLoginOrga()">
    </div>
    <button class="btn btn-orga btn-full" onclick="doLoginOrga()">Accéder</button>
    <div class="msg-error" id="err-orga"></div>
  </div>
</div>

<!-- ══ MODAL CONFIRMATION INSCRIPTION ══ -->
<div class="modal-overlay" id="modal-inscription">
  <div class="modal-box" style="max-width:460px;text-align:center">
    <button class="modal-close" onclick="closeModal('modal-inscription')">✕</button>
    <div class="modal-title" id="modal-insc-titre">Inscription</div>
    <div id="modal-insc-detail" style="font-family:'IM Fell English',serif;font-style:italic;font-size:1.05rem;margin-bottom:24px;color:var(--ink-light)"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn" onclick="confirmInscription()">Confirmer</button>
      <button class="btn-ghost" onclick="closeModal('modal-inscription')">Annuler</button>
    </div>
    <div class="msg-error"   id="err-insc"></div>
    <div class="msg-success" id="ok-insc"></div>
  </div>
</div>

<!-- ══ MODAL CRÉER / MODIFIER ÉVÉNEMENT ══ -->
<div class="modal-overlay" id="modal-event">
  <div class="modal-box modal-box-wide">
    <button class="modal-close" onclick="closeModal('modal-event')">✕</button>
    <div class="modal-title" id="modal-event-title">+ Nouvel événement</div>
    <input type="hidden" id="e-id">
    <div class="form-group">
      <label>Titre</label>
      <input type="text" id="e-titre" placeholder="Nom de l'événement">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group">
        <label>Début</label>
        <input type="datetime-local" id="e-date-debut">
      </div>
      <div class="form-group">
        <label>Fin</label>
        <input type="datetime-local" id="e-date-fin">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group">
        <label>Lieu</label>
        <input type="text" id="e-lieu" placeholder="Adresse ou lieu-dit">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="e-type">
          <option value="GN">GN</option>
          <option value="Atelier">Atelier</option>
          <option value="Réunion">Réunion</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Organisateurs</label>
      <input type="text" id="e-organisateurs" placeholder="Noms séparés par des virgules">
    </div>
    <div class="form-group">
      <label>Description / Notes</label>
      <textarea id="e-description" placeholder="Informations, programme, consignes…"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group">
        <label>Places totales</label>
        <input type="number" id="e-places-totales" min="1" value="20">
      </div>
      <div class="form-group" id="row-places-dispo" style="display:none">
        <label>Places disponibles</label>
        <input type="number" id="e-places-dispo" min="0">
      </div>
    </div>
    <button class="btn btn-full" style="margin-top:6px" onclick="saveEvent()">Enregistrer</button>
    <div class="msg-error"   id="err-event"></div>
    <div class="msg-success" id="ok-event"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
//  CONFIG SUPABASE
// ════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://zutgjwnmolzwkbkdzfko.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_E_81QRnHPOXTDcxLv9l2wQ_dpqspXFf';
const ORGA_PASSWORD = 'faerie2024'; 

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
const state = {
  user: null,
  events: [],
  orgaEvents: [],
  mesInscriptions: [],
  pendingEventId: null,
  pendingEventTitre: null,
  pendingEventDispo: null
};

// ════════════════════════════════════════════════════
//  HELPERS DATE
// ════════════════════════════════════════════════════
function formatDatetime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'long', year: 'numeric' })
    + ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ════════════════════════════════════════════════════
//  CHARGEMENT ÉVÉNEMENTS
// ════════════════════════════════════════════════════
async function loadPublicEvents() {
  const grid = document.getElementById('public-events-grid');
  grid.innerHTML = '<div class="empty-state">Chargement…</div>';
  try {
    const now = new Date().toISOString();
    const { data, error } = await sb
      .from('evenements')
      .select('*')
      .or(`date_debut.gte.${now},date.gte.${new Date().toISOString().split('T')[0]}`)
      .order('date_debut', { ascending: true, nullsFirst: false });

    if (error) throw error;
    state.events = data || [];

    if (state.user) {
      const { data: inscr } = await sb
        .from('inscriptions')
        .select('event_id')
        .eq('user_id', state.user.id);
      state.mesInscriptions = (inscr || []).map(i => i.event_id);
    }

    renderPublicEvents(state.events);
  } catch(e) {
    grid.innerHTML = `<div class="empty-state" style="color:var(--red-blood)">Impossible de charger les événements.</div>`;
    console.error(e);
  }
}

function renderPublicEvents(list) {
  const grid = document.getElementById('public-events-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">Aucun événement à venir pour l\'instant.</div>';
    return;
  }
  grid.innerHTML = list.map(ev => {
    const placesTot   = ev.places_totales    || 0;
    const placesDispo = ev.places_disponibles || 0;
    const pct     = placesTot > 0 ? Math.round((1 - placesDispo / placesTot) * 100) : 100;
    const complet = placesDispo <= 0;
    const inscrit = state.mesInscriptions.includes(ev.id);

    const debut = ev.date_debut ? formatDatetime(ev.date_debut) : (ev.date ? new Date(ev.date).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'}) : '—');
    const fin   = ev.date_fin   ? formatDatetime(ev.date_fin)   : null;

    let btnHtml = '';
    if (inscrit) {
      btnHtml = `<span class="badge-inscrit">✦ Inscrit·e</span>`;
    } else {
      const btnClass = 'btn btn-sm' + (complet ? ' btn-danger' : '');
      const btnLabel = complet ? "Liste d'attente" : "S'inscrire";
      btnHtml = `<button class="${btnClass}" onclick="handleInscriptionClick('${ev.id}', '${ev.titre.replace(/'/g,"\\'")}', ${placesDispo})">${btnLabel}</button>`;
    }

    return `
    <div class="event-card">
      <div class="event-card-header">
        <div class="event-card-titre">${ev.titre}</div>
        <div class="event-card-type">${ev.type || '—'}</div>
      </div>
      <div class="event-card-body">
        <div class="event-info-item">
          <span class="event-info-label">Début</span>
          <span class="event-info-val">📅 ${debut}</span>
        </div>
        ${fin ? `<div class="event-info-item"><span class="event-info-label">Fin</span><span class="event-info-val">🏁 ${fin}</span></div>` : '<div></div>'}
        <div class="event-info-item"><span class="event-info-label">Lieu</span><span class="event-info-val">📍 ${ev.lieu || '—'}</span></div>
        <div class="event-info-item"><span class="event-info-label">Organisateurs</span><span class="event-info-val">${ev.organisateurs || '—'}</span></div>
      </div>
      ${ev.description ? `<div class="event-description">${ev.description}</div>` : ''}
      <div class="event-card-footer">
        <div class="jauge-wrap">
          <div class="jauge-bar"><div class="jauge-fill${complet ? ' complet' : ''}" style="width:${pct}%"></div></div>
          <span class="jauge-text">${placesDispo} / ${placesTot} place${placesTot > 1 ? 's' : ''}</span>
          ${complet && !inscrit ? '<span class="badge-attente">COMPLET</span>' : ''}
        </div>
        ${btnHtml}
      </div>
    </div>`;
  }).join('');
}

function filterEvents() {
  const q    = document.getElementById('filter-search').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const filtered = state.events.filter(ev => {
    const matchQ    = !q || ev.titre.toLowerCase().includes(q) || (ev.lieu || '').toLowerCase().includes(q);
    const matchType = !type || ev.type === type;
    return matchQ && matchType;
  });
  renderPublicEvents(filtered);
}

// ════════════════════════════════════════════════════
//  INSCRIPTION
// ════════════════════════════════════════════════════
function handleInscriptionClick(eventId, titre, placesDispo) {
  state.pendingEventId    = eventId;
  state.pendingEventTitre = titre;
  state.pendingEventDispo = placesDispo;

  if (!state.user) {
    const ctx = document.getElementById('auth-context');
    ctx.style.display = '';
    ctx.textContent = `Pour vous inscrire à « ${titre} », connectez-vous ou créez un compte.`;
    document.getElementById('modal-auth-titre').textContent = 'Connexion requise';
    switchAuthTab('connexion');
    openModal('modal-auth');
  } else {
    openConfirmInscription();
  }
}

function openConfirmInscription() {
  document.getElementById('modal-insc-titre').textContent = state.pendingEventTitre;
  document.getElementById('modal-insc-detail').textContent =
    state.pendingEventDispo > 0
      ? `Il reste ${state.pendingEventDispo} place(s). Confirmez-vous votre inscription ?`
      : "Cet événement est complet. Souhaitez-vous rejoindre la liste d'attente ?";
  hideMsg('err-insc'); hideMsg('ok-insc');
  openModal('modal-inscription');
}

async function confirmInscription() {
  const btn = document.querySelector('#modal-inscription .btn');
  try {
    btn.disabled = true; // Empêche le double clic
    
    if (state.pendingEventDispo > 0) {
      const { error: errInscr } = await sb.from('inscriptions').insert({
        event_id: state.pendingEventId,
        user_id:  state.user.id
      });
      
      if (errInscr) {
        // Si l'erreur est un doublon (code 23505 en SQL ou message contenant "already")
        if (errInscr.message.includes('unique') || errInscr.code === '23505') {
          showMsg('err-insc', '✦ Vous êtes déjà inscrit·e à cet événement !');
          return;
        }
        throw errInscr;
      }

      // Mise à jour des places
      await sb.from('evenements')
        .update({ places_disponibles: state.pendingEventDispo - 1 })
        .eq('id', state.pendingEventId);

      showToast('✦ Inscription confirmée !');
    } else {
      // Gestion liste d'attente
      const { error } = await sb.from('liste_attente').insert({
        event_id: state.pendingEventId,
        user_id:  state.user.id
      });
      if (error) throw error;
      showToast("⚠ Ajouté·e à la liste d'attente");
    }

    // --- ACTIONS DE SORTIE ---
    closeModal('modal-inscription'); // On ferme enfin la fenêtre !
    await loadPublicEvents();        // On rafraîchit la liste (le bouton passera en "Inscrit")
    
  } catch(e) {
    showMsg('err-insc', e.message || 'Une erreur est survenue.');
  } finally {
    btn.disabled = false;
  }
}

// ════════════════════════════════════════════════════
//  AUTH JOUEUR
// ════════════════════════════════════════════════════
function switchAuthTab(tab) {
  document.getElementById('tab-connexion').classList.toggle('active', tab === 'connexion');
  document.getElementById('tab-inscription').classList.toggle('active', tab === 'inscription');
  document.getElementById('form-connexion').style.display   = tab === 'connexion'  ? '' : 'none';
  document.getElementById('form-inscription').style.display = tab === 'inscription' ? '' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const mdp   = document.getElementById('login-mdp').value;
  if (!email || !mdp) { showMsg('err-login', 'Remplissez tous les champs.'); return; }
  hideMsg('err-login');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: mdp });
  if (error) { showMsg('err-login', 'Email ou mot de passe incorrect.'); return; }
  state.user = data.user;
  closeModal('modal-auth');
  updateHeaderUserZone();
  await loadPublicEvents();
  showToast(`✦ Bienvenue !`);
  if (state.pendingEventId) openConfirmInscription();
}

async function doRegister() {
  const btn = document.querySelector('#form-inscription .btn-full');
  if (btn.disabled) return;

  const prenom = document.getElementById('reg-prenom').value.trim();
  const nom    = document.getElementById('reg-nom').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const mdp    = document.getElementById('reg-mdp').value;

  if (!prenom || !nom || !email || !mdp) { 
    showMsg('err-reg', 'Tous les champs sont obligatoires.'); 
    return; 
  }

  try {
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = "Magie en cours...";
    hideMsg('err-reg');

    const { data, error } = await sb.auth.signUp({
      email, password: mdp,
      options: { data: { prenom, nom } }
    });

    if (error) throw error;

    showMsg('ok-reg', '✦ Bienvenue ! Connexion en cours...', 'success');
    
    setTimeout(async () => {
        await doLoginDirect(email, mdp);
    }, 1500);

  } catch (err) {
    let message = err.message;
    if (message.includes("429")) message = "Trop de tentatives. Attendez 5 min.";
    showMsg('err-reg', message);
    btn.disabled = false;
    btn.textContent = "Créer mon compte";
  }
}

async function doLoginDirect(email, password) {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (!error) {
        state.user = data.user;
        closeModal('modal-auth');
        updateHeaderUserZone();
        await loadPublicEvents();
        showToast(`✦ Bienvenue ${state.user.user_metadata.prenom} !`);
    }
}

async function logoutJoueur() {
  await sb.auth.signOut();
  state.user = null;
  state.mesInscriptions = [];
  updateHeaderUserZone();
  renderPublicEvents(state.events);
  showToast('À bientôt !');
}

function updateHeaderUserZone() {
  const zone = document.getElementById('header-user-zone');
  if (state.user) {
    const prenom = state.user.user_metadata?.prenom || state.user.email;
    zone.innerHTML = `<span style="font-family:'Cinzel',serif;font-size:0.8rem;color:var(--ink-light);letter-spacing:1px;">✦ ${prenom}</span>
      <button class="btn-ghost" onclick="logoutJoueur()" style="margin-left:8px">Déconnexion</button>`;
  } else {
    zone.innerHTML = `<button class="btn btn-sm" onclick="openAuthModal()">Se connecter</button>`;
  }
}

function openAuthModal() {
  document.getElementById('auth-context').style.display = 'none';
  document.getElementById('modal-auth-titre').textContent = 'Rejoindre Faérie';
  state.pendingEventId = null;
  switchAuthTab('connexion');
  hideMsg('err-login'); hideMsg('ok-login'); hideMsg('err-reg'); hideMsg('ok-reg');
  openModal('modal-auth');
}

// ════════════════════════════════════════════════════
//  AUTH ORGA
// ════════════════════════════════════════════════════
function openOrgaLogin() {
  document.getElementById('orga-pwd').value = '';
  hideMsg('err-orga');
  openModal('modal-orga-auth');
}

async function doLoginOrga() {
  const pwd = document.getElementById('orga-pwd').value;
  if (pwd !== ORGA_PASSWORD) { showMsg('err-orga', 'Mot de passe incorrect.'); return; }
  closeModal('modal-orga-auth');
  await loadOrgaEvents();
  document.getElementById('public-screen').style.display = 'none';
  document.getElementById('orga-screen').style.display   = '';
}

function logoutOrga() {
  document.getElementById('orga-screen').style.display   = 'none';
  document.getElementById('public-screen').style.display = '';
}

// ════════════════════════════════════════════════════
//  VUE ORGA
// ════════════════════════════════════════════════════
async function loadOrgaEvents() {
  const tbody = document.getElementById('orga-events-body');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;font-style:italic;color:var(--ink-light);">Chargement…</td></tr>';
  const { data, error } = await sb.from('evenements').select('*').order('date_debut', { ascending: true, nullsFirst: false });
  if (error) { tbody.innerHTML = `<tr><td colspan="6" style="color:var(--red-blood);padding:20px">Erreur : ${error.message}</td></tr>`; return; }
  state.orgaEvents = data || [];
  renderOrgaTable(state.orgaEvents);
}

function renderOrgaTable(list) {
  const tbody = document.getElementById('orga-events-body');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;font-style:italic;color:var(--ink-light);">Aucun événement.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(ev => {
    const debut = ev.date_debut ? new Date(ev.date_debut).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : (ev.date || '—');
    return `<tr>
      <td><strong style="font-family:'Cinzel',serif;font-size:0.88rem">${ev.titre}</strong></td>
      <td>${debut}</td>
      <td>${ev.lieu || '—'}</td>
      <td>${ev.type || '—'}</td>
      <td>${ev.places_disponibles}/${ev.places_totales}</td>
      <td><button class="btn btn-sm" onclick="openModalEditEvent('${ev.id}')">✏ Modifier</button></td>
    </tr>`;
  }).join('');
}

function filterOrgaEvents(q) {
  const filtered = state.orgaEvents.filter(ev => (ev.titre + (ev.lieu || '') + (ev.type || '')).toLowerCase().includes(q.toLowerCase()));
  renderOrgaTable(filtered);
}

// ════════════════════════════════════════════════════
//  MODAL ÉVÉNEMENT
// ════════════════════════════════════════════════════
function openModalCreateEvent() {
  document.getElementById('modal-event-title').textContent = '+ Nouvel événement';
  document.getElementById('e-id').value = '';
  ['e-titre','e-lieu','e-organisateurs','e-description'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('e-date-debut').value = '';
  document.getElementById('e-date-fin').value   = '';
  document.getElementById('e-type').value = 'GN';
  document.getElementById('e-places-totales').value = '20';
  document.getElementById('row-places-dispo').style.display = 'none';
  hideMsg('err-event'); hideMsg('ok-event');
  openModal('modal-event');
}

function openModalEditEvent(id) {
  const ev = state.orgaEvents.find(e => e.id === id);
  if (!ev) return;
  document.getElementById('modal-event-title').textContent = '✏ Modifier l\'événement';
  document.getElementById('e-id').value           = ev.id;
  document.getElementById('e-titre').value        = ev.titre;
  document.getElementById('e-date-debut').value   = toLocalInput(ev.date_debut);
  document.getElementById('e-date-fin').value     = toLocalInput(ev.date_fin);
  document.getElementById('e-lieu').value         = ev.lieu || '';
  document.getElementById('e-organisateurs').value= ev.organisateurs || '';
  document.getElementById('e-type').value         = ev.type || 'GN';
  document.getElementById('e-description').value  = ev.description || '';
  document.getElementById('e-places-totales').value = ev.places_totales || '';
  document.getElementById('e-places-dispo').value   = ev.places_disponibles || '';
  document.getElementById('row-places-dispo').style.display = '';
  hideMsg('err-event'); hideMsg('ok-event');
  openModal('modal-event');
}

async function saveEvent() {
  const id            = document.getElementById('e-id').value;
  const titre         = document.getElementById('e-titre').value.trim();
  const date_debut    = document.getElementById('e-date-debut').value;
  const date_fin      = document.getElementById('e-date-fin').value || null;
  const lieu          = document.getElementById('e-lieu').value.trim();
  const organisateurs = document.getElementById('e-organisateurs').value.trim();
  const type          = document.getElementById('e-type').value;
  const description   = document.getElementById('e-description').value.trim() || null;
  const places_totales = parseInt(document.getElementById('e-places-totales').value) || 0;

  if (!titre || !date_debut) { showMsg('err-event', 'Titre et date de début sont obligatoires.'); return; }
  hideMsg('err-event');

  const date = date_debut.split('T')[0];
  let error;
  if (id) {
    const places_disponibles = parseInt(document.getElementById('e-places-dispo').value) || 0;
    ({ error } = await sb.from('evenements').update({ titre, date, date_debut, date_fin, lieu, organisateurs, type, description, places_totales, places_disponibles }).eq('id', id));
  } else {
    ({ error } = await sb.from('evenements').insert({ titre, date, date_debut, date_fin, lieu, organisateurs, type, description, places_totales, places_disponibles: places_totales }));
  }

  if (error) { showMsg('err-event', error.message); return; }
  showMsg('ok-event', '✦ Événement enregistré !', 'success');
  showToast('✦ Enregistré');
  await loadOrgaEvents();
}

// ════════════════════════════════════════════════════
//  UTILITAIRES UI
// ════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showMsg(id, txt, type = 'error') {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = txt;
  el.style.display = '';
  el.className = type === 'success' ? 'msg-success' : 'msg-error';
}

function hideMsg(id) { 
  const el = document.getElementById(id);
  if (el) el.style.display = 'none'; 
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) state.user = session.user;
  updateHeaderUserZone();
  await loadPublicEvents();
});
</script>
</body>
</html>
